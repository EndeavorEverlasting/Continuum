name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Validate repository contracts and packets
        run: python scripts/validate.py
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Compile Python sources
        run: python -m compileall -q src tests scripts
      - name: Install package
        run: python -m pip install --no-deps -e .
      - name: Exercise installed doctor command
        run: continuum doctor . --json
      - name: Prove caller-reported success cannot complete
        shell: bash
        run: |
          continuum task . --domain local-inspection --owned "Continuum repository validation" --forbidden "network access" --forbidden "cross-repository mutation" --json > /tmp/continuum-task.json
          set +e
          continuum result /tmp/continuum-task.json --outcome succeeded --evidence git_status=passed=git-status-short --evidence changed_files=passed=git-diff-stat --evidence validation_results=passed=ci-validation --evidence commit_sha=passed=${GITHUB_SHA} --evidence github_actions=passed=caller-reported-ci --domain-availability unverified --json > /tmp/continuum-result.json
          result_exit=$?
          set -e
          test "$result_exit" -eq 1
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/continuum-result.json').read_text())
          assert payload['completion_gate']['status'] == 'unverified'
          assert payload['transition']['decision'] == 'blocked'
          PY
      - name: Prove canonical branch topology gate
        shell: bash
        run: |
          head_sha=$(git rev-parse HEAD)
          python - "$head_sha" <<'PY'
          import json, sys
          from pathlib import Path
          sha = sys.argv[1]
          snapshot = {
              '$schema': 'schemas/branch-topology-snapshot.schema.json',
              'schema_version': 1,
              'kind': 'continuum.branch-topology-snapshot',
              'canonical_branch': {'name': 'main', 'head_sha': sha},
              'proposed_base': {'name': 'main', 'head_sha': sha, 'dirty': False},
              'stacking_exception': {'allowed': False, 'reason': None},
              'open_pull_requests': [],
          }
          Path('/tmp/continuum-topology.json').write_text(json.dumps(snapshot))
          PY
          continuum topology /tmp/continuum-topology.json --repository . --json > /tmp/continuum-topology-decision.json
          python - <<'PY'
          import json
          from pathlib import Path
          payload = json.loads(Path('/tmp/continuum-topology-decision.json').read_text())
          assert payload['allowed'] is True
          assert payload['decision'] == 'create_branch_from_canonical'
          PY

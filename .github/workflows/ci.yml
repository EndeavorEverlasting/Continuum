name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate repository contracts and task packet
        run: python scripts/validate.py

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Compile Python sources
        run: python -m compileall -q src tests scripts

      - name: Install package
        run: python -m pip install --no-deps -e .

      - name: Exercise installed doctor command
        run: continuum doctor . --json

      - name: Exercise installed task command
        run: >-
          continuum task .
          --domain local-inspection
          --owned "Continuum repository validation"
          --forbidden "network access"
          --forbidden "cross-repository mutation"
          --json
